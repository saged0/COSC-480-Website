<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/views/app.css">
</head>
<body>
    <div class="scene-overlay" aria-hidden="true"></div>

    <div id="login-status-popup" class="status-popup" role="alert" aria-live="polite" hidden>
        <span>Login was unsuccessful.</span>
        <button id="close-status-popup" type="button" aria-label="Close message">Close</button>
    </div>

    <main class="login-shell">
        <section class="login-card">
            <h2>Login</h2>

            <form action="/user" method="post">
                <div class="input-field">
                    <input type="text" name="username" id="username" placeholder="Enter Username" required>
                </div>
                <div class="input-field">
                    <input type="password" name="password" id="password" placeholder="Enter Password" required>
                </div>
                <input type="submit" value="LogIn">
            </form>
        </section>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const popup = document.getElementById('login-status-popup');
        const closePopupButton = document.getElementById('close-status-popup');

        closePopupButton.addEventListener('click', () => {
            popup.hidden = true;
        });

        if (params.get('loginError') === '1') {
            popup.hidden = false;
            window.history.replaceState({}, document.title, '/');
        }
    </script>
</body>
</html>
